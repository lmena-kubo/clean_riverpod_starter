name: clean_riverpod_starter
description: "Flutter Clean Architecture starter with Riverpod 3, go_router, Dio, freezed, and flavors."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.0

dependencies:
  cupertino_icons: ^1.0.8
  dio: ^5.7.0
  flutter:
    sdk: flutter
  flutter_riverpod: ^3.3.1
  flutter_secure_storage: ^9.2.2
  freezed_annotation: ^3.0.0
  go_router: ^14.6.2
  json_annotation: ^4.11.0
  logger: ^2.5.0
  riverpod_annotation: ^4.0.2

dev_dependencies:
  build_runner: ^2.4.13
  flutter_test:
    sdk: flutter
  freezed: ^3.0.0
  json_serializable: ^6.8.0
  mocktail: ^1.0.4
  riverpod_generator: ^4.0.3
  very_good_analysis: ^7.0.0

flutter:
  uses-material-design: true
